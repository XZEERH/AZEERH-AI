<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azeerh AI | Omega Access</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

    <div class="mainframe">
        <header class="top-bar">
            <div class="system-status">
                <div class="orbital-logo">IEA</div>
                <div class="meta-data">
                    <span class="label">AKSES OMEGA</span>
                    <span class="value">KOMANDAN</span>
                </div>
            </div>
            <button id="configBtn" class="menu-dots">
                <span></span><span></span><span></span>
            </button>
        </header>

        <main id="chatDisplay" class="neural-link-display"></main>

        <footer class="control-deck">
            <div class="input-hub">
                <div class="terminal-id">AZ_LINK ></div>
                <input type="text" id="userInput" placeholder="Masukkan perintah..." autocomplete="off">
                <button id="sendBtn" class="push-button">
                    <div class="inner-btn">ENTER</div>
                </button>
            </div>
        </footer>
    </div>

    <div id="settingsModal" class="modal hidden">
        <div class="modal-content glass-blur">
            <h2 class="neon-pink-text">SYSTEM_OVERRIDE</h2>
            <div class="config-row">
                <label>MODUL_NEURAL</label>
                <select id="modelSelect">
                    <option value="llama-3.3-70b-versatile">Llama 3.3 70B</option>
                    <option value="llama-3.1-8b-instant">Llama 3.1 8B</option>
                </select>
            </div>
            <button id="clearMem" class="btn-danger">PURGE_LOGS</button>
            <button id="closeConfig" class="btn-primary">CLOSE</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
