<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Azeerh AI | EAC Command Center</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body onload="initStars()">
    <div id="starfield" class="star-layer"></div>

    <div class="mainframe">
        <header class="top-bar">
            <div class="system-status">
                <div class="atom-mini">
                    <div class="nucleus-mini">EAC</div>
                    <div class="orbit-mini ob1"></div>
                    <div class="orbit-mini ob2"></div>
                    <div class="orbit-mini ob3"></div>
                    <div class="electron-mini el1"></div>
                    <div class="electron-mini el2"></div>
                    <div class="electron-mini el3"></div>
                </div>
                <div class="meta-data">
                    <span class="label">AKSES OMEGA</span>
                    <span class="value">KOMANDAN</span>
                </div>
            </div>
            <div id="configBtn" class="menu-trigger">
                <div class="dots-wrapper">
                    <span></span><span></span><span></span>
                </div>
            </div>
        </header>

        <main id="chatDisplay" class="chat-container"></main>

        <footer class="control-deck">
            <div class="input-hub">
                <span class="terminal-id">AZ_LINK></span>
                <input type="text" id="userInput" placeholder="Ketik perintah..." autocomplete="off">
                <button id="sendBtn" class="push-button">
                    <span class="inner-btn">SEND</span>
                </button>
            </div>
        </footer>
    </div>

    <div id="settingsModal" class="modal hidden">
        <div class="modal-content">
            <h2 class="neon-title">CORE_SYSTEM_OVERRIDE</h2>
            <div class="config-row">
                <label>MODEL_NEURAL</label>
                <select id="modelSelect">
                    <option value="llama-3.3-70b-versatile">Llama 3.3 70B</option>
                    <option value="llama-3.1-8b-instant">Llama 3.1 8B</option>
                </select>
            </div>
            <button id="clearMem" class="danger-btn">PURGE_LOGS</button>
            <button id="closeConfig" class="primary-btn">CLOSE</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
